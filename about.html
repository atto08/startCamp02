<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me | 박현도</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deepNavy: '#0A1128', navyLight: '#162447', textMain: '#F8F9FA', textMuted: '#ADB5BD',
                        accentRed: '#E63946'
                    },
                    fontFamily: { sans: ['Pretendard', 'sans-serif'] }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .fade-in-up { @apply opacity-0 translate-y-[30px] transition-all duration-[800ms] ease-out; }
            .fade-in-up.visible { @apply opacity-100 translate-y-0; }
            .nav-active-link { @apply text-textMain font-bold relative; }
            .nav-active-link::after { @apply content-[''] absolute -bottom-[5px] left-0 w-full h-[2px] bg-textMain rounded-sm; }
            .toggle .line1 { @apply -rotate-45 -translate-x-[5px] translate-y-[8px]; }
            .toggle .line2 { @apply opacity-0; }
            .toggle .line3 { @apply rotate-45 -translate-x-[5px] -translate-y-[8px]; }
        }
    </style>
</head>
<body class="bg-deepNavy text-textMain leading-relaxed overflow-x-hidden font-sans">

    <nav class="fixed top-0 left-0 w-full h-[80px] bg-deepNavy/95 backdrop-blur-md flex justify-between items-center px-[5%] z-50 shadow-md">
        <div class="text-2xl font-bold tracking-wide">
            <a href="index.html" class="text-textMain">안녕하세요박현도입니다잘부탁드립니다</a>
        </div>
        <ul id="nav-links" class="flex list-none gap-10 m-0 p-0 max-md:absolute max-md:top-[80px] max-md:-right-full max-md:w-[60%] max-md:h-screen max-md:bg-deepNavy max-md:flex-col max-md:items-center max-md:justify-start max-md:pt-[50px] max-md:transition-all max-md:duration-400 max-md:shadow-[-5px_0_10px_rgba(0,0,0,0.2)]">
            <li class="max-md:my-5"><a href="index.html" class="text-textMuted hover:text-textMain transition-colors duration-300 py-1 text-lg font-medium">Home</a></li>
            <li class="max-md:my-5"><a href="about.html" class="nav-active-link text-textMuted hover:text-textMain transition-colors duration-300 py-1 text-lg">About</a></li>
            <li class="max-md:my-5"><a href="skills.html" class="text-textMuted hover:text-textMain transition-colors duration-300 py-1 text-lg font-medium">Skills</a></li>
            <li class="max-md:my-5"><a href="vision.html" class="text-textMuted hover:text-textMain transition-colors duration-300 py-1 text-lg font-medium">Vision</a></li>
        </ul>
        <button id="hamburger" class="hidden max-md:flex flex-col gap-[5px] cursor-pointer bg-transparent border-none p-1" aria-label="메뉴 열기">
            <div class="line line1 w-[25px] h-[3px] bg-textMain transition-all duration-300"></div>
            <div class="line line2 w-[25px] h-[3px] bg-textMain transition-all duration-300"></div>
            <div class="line line3 w-[25px] h-[3px] bg-textMain transition-all duration-300"></div>
        </button>
    </nav>

    <section class="pt-[150px] pb-[100px] min-h-screen flex flex-col justify-center items-center px-5">
        <div class="fade-in-up visible bg-navyLight border border-white/5 rounded-2xl p-10 md:p-[50px_40px] w-full max-w-[600px] shadow-2xl">
            <h1 class="text-3xl font-bold mb-3 text-textMain break-keep">프로필</h1>
            <p class="text-textMuted mb-10 text-lg border-b border-white/10 pb-5 break-keep">스포츠의 역동성과 거침없는 실행력을 코드로 풀어냅니다.</p>
            
            <ul class="list-none space-y-5">
                <li class="flex flex-col md:flex-row md:items-center text-lg">
                    <span class="w-[120px] font-bold text-textMuted tracking-widest mb-1 md:mb-0">이름</span>
                    <span class="font-medium text-textMain">박현도</span>
                </li>
                <li class="flex flex-col md:flex-row md:items-center text-lg">
                    <span class="w-[120px] font-bold text-textMuted tracking-widest mb-1 md:mb-0">출생연도</span>
                    <span class="font-medium text-textMain">1997년(만28세)</span>
                </li>
                <li class="flex flex-col md:flex-row md:items-center text-lg">
                    <span class="w-[120px] font-bold text-textMuted tracking-widest mb-1 md:mb-0">취미</span>
                    <span class="font-medium text-textMain">축구 / 풋살</span>
                </li>
                <li class="flex flex-col md:flex-row md:items-center text-lg">
                    <span class="w-[120px] font-bold text-textMuted tracking-widest mb-1 md:mb-0">MBTI</span>
                    <span class="font-medium text-textMain flex items-center mt-1 md:mt-0">
                        ESTP 
                        <span class="bg-accentRed text-white px-3 py-1 rounded-full text-[0.9rem] font-extrabold ml-3 tracking-wide shadow-[0_4px_10px_rgba(230,57,70,0.3)]">Active & Logical</span>
                    </span>
                </li>
            </ul>
        </div>
    </section>

    <script>
        document.getElementById('hamburger').addEventListener('click', function() {
            const navLinks = document.getElementById('nav-links');
            navLinks.classList.toggle('max-md:-right-full');
            navLinks.classList.toggle('max-md:right-0');
            this.classList.toggle('toggle');
        });
    </script>
</body>
</html>
